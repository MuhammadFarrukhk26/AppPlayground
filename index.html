<!doctype html>
<html lang="en">
  <head>
    <script>
      // Sync global catcher to prevent anonymous cross-origin iframe/extension "Script error." telemetry alerts from crashing progress.
      (function() {
        // Safe console.error wrapper
        var originalConsoleError = console.error;
        console.error = function() {
          var args = Array.prototype.slice.call(arguments);
          var argStr = "";
          try {
            for (var i = 0; i < args.length; i++) {
              var val = "";
              try {
                if (args[i] === null || args[i] === undefined) {
                  val = "";
                } else if (typeof args[i] === "object") {
                  val = args[i].message || args[i].name || Object.prototype.toString.call(args[i]);
                } else {
                  val = String(args[i]);
                }
              } catch (innerErr) {
                val = "";
              }
              argStr += " " + val;
            }
          } catch (outerErr) {}
          
          var lower = argStr.toLowerCase();
          if (
            lower.indexOf('script error') !== -1 ||
            lower.indexOf('resizeobserver') !== -1 ||
            lower.indexOf('loop limit') !== -1 ||
            lower.indexOf('loop completed') !== -1
          ) {
            return;
          }
          originalConsoleError.apply(console, arguments);
        };

        // Safe console.warn wrapper to avoid printing intercepted telemetry warnings
        var originalConsoleWarn = console.warn;
        console.warn = function() {
          var args = Array.prototype.slice.call(arguments);
          var argStr = "";
          try {
            for (var i = 0; i < args.length; i++) {
              var val = "";
              try {
                if (args[i] === null || args[i] === undefined) {
                  val = "";
                } else if (typeof args[i] === "object") {
                  val = args[i].message || args[i].name || Object.prototype.toString.call(args[i]);
                } else {
                  val = String(args[i]);
                }
              } catch (innerErr) {
                val = "";
              }
              argStr += " " + val;
            }
          } catch (outerErr) {}
          
          var lower = argStr.toLowerCase();
          if (
            lower.indexOf('script error') !== -1 ||
            lower.indexOf('resizeobserver') !== -1 ||
            lower.indexOf('loop limit') !== -1 ||
            lower.indexOf('loop completed') !== -1
          ) {
            return;
          }
          originalConsoleWarn.apply(console, arguments);
        };

        var safeHost = '';
        try {
          safeHost = window.location && window.location.host ? window.location.host : '';
        } catch (e) {}

        window.onerror = function (message, source, lineno, colno, error) {
          var msg = String(message || '').toLowerCase();
          if (
            !message ||
            msg.indexOf('script error') !== -1 ||
            msg.indexOf('resizeobserver') !== -1 ||
            msg.indexOf('loop limit') !== -1 ||
            msg.indexOf('loop completed') !== -1
          ) {
            return true; // Silence completely
          }
          console.warn('Intercepted unhandled: ', message);
          return true;
        };

        window.addEventListener('error', function (e) {
          var msg = String(e.message || '').toLowerCase();
          if (
            !e.message ||
            msg.indexOf('script error') !== -1 ||
            msg.indexOf('resizeobserver') !== -1 ||
            msg.indexOf('loop limit') !== -1 ||
            msg.indexOf('loop completed') !== -1
          ) {
            e.stopImmediatePropagation();
            e.preventDefault();
          }
        }, true);

        window.addEventListener('unhandledrejection', function (e) {
          var msg = e.reason ? String(e.reason.message || e.reason || '').toLowerCase() : '';
          if (
            !e.reason ||
            msg.indexOf('script error') !== -1 ||
            msg.indexOf('resizeobserver') !== -1 ||
            msg.indexOf('loop limit') !== -1 ||
            msg.indexOf('loop completed') !== -1
          ) {
            e.stopImmediatePropagation();
            e.preventDefault();
          }
        }, true);
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
